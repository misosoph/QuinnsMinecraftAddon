name: Package Minecraft Add-on

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and package
        shell: pwsh
        run: ./scripts/package.ps1

      - name: Upload mcpack artifact
        uses: actions/upload-artifact@v4
        with:
          name: quinns-enderstorm-mcpack
          path: dist/quinns-enderstorm.mcpack
