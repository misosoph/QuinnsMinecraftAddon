name: Package Minecraft Add-on

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and package
        shell: pwsh
        run: ./scripts/package.ps1

      - name: Upload Enderstorm artifact
        uses: actions/upload-artifact@v4
        with:
          name: quinns-enderstorm-addon
          path: dist/quinns-enderstorm.mcaddon
          if-no-files-found: error

      - name: Upload Security Add-On artifact
        uses: actions/upload-artifact@v4
        with:
          name: quinns-security-addon
          path: dist/quinns-security-addon.mcaddon
          if-no-files-found: error
